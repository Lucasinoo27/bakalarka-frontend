<!doctype html>
<!-- OPTIMALIZÁCIA FÁZA 4: Pridaný lang atribút -->
<html lang="sk">
<head>
  <meta charset="utf-8">
  
  <!-- SEO: Dynamický titulok a metatagy (nastavujú sa v komponentoch) -->
  <title>Recepty App</title>
  
  <!-- OPTIMALIZÁCIA FÁZA 4: Opravený viewport - odstránený user-scalable=no, aby sa dalo približovať stránku (A11y) -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <base href="/">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- OPTIMALIZÁCIA FÁZA 4: Preconnect pre rýchlejšie stiahnutie fontov -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- OPTIMALIZÁCIA FÁZA 4: Pridaný &display=swap pre riešenie Lighthouse 'Font display' -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- OPTIMALIZÁCIA FÁZA 4: Asynchrónne načítanie Bootstrapu (preload hack) na vyriešenie Render-blocking CSS a odstránenie nepotrebného FontAwesome -->
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
</head>
<body>
  <app-root></app-root>
  
  <!-- OPTIMALIZÁCIA FÁZA 4: Odstránili sme zbytočné blokujúce JS knižnice (jQuery, Moment.js). -->
  <!-- Bootstrap JS (ak ho nutne nepotrebujeme pre dropdowny) môžeme tiež odstrániť, alebo načítať s defer -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
