<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ReceptyApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Anti-patterns: Masívne zbytočné knižnice, neoptimalizované fonty a blokovanie renderu (Fáza 3) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Sťahujeme viaceré rezy písma Montserrat, no nepoužijeme preconnect ani display=swap -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=auto" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
  
  <!-- Anti-pattern: Zbytočné načítanie obrovských JS súborov na konci, hoci z nich použijeme možno 1% alebo nič -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Zastaralý a obrovský moment.js pre prácu s časom (junior pattern) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
</body>
</html>
