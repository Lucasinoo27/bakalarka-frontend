<div class="container mt-5 mb-5">
  <h1 class="text-center mb-5">Moje Neoptimalizované Recepty</h1>
  
  <div class="row">
    @for (recept of recepty; track recept._id) {
      <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
          
          <!-- Opravený img tag (pridaná medzera a na konci lomítko pre istotu) -->
          <img [src]="recept.obrazok_url" class="card-img-top" alt="Obrázok k receptu" style="height: 250px; object-fit: cover;" />
          
          <div class="card-body">
            <h5 class="card-title">{{ recept.nazov }}</h5>
            <span class="badge bg-primary mb-2">{{ recept.kategoria }}</span>
            <p class="card-text">{{ recept.kratky_popis }}</p>
            <p class="text-muted"><small>⏱ Čas prípravy: {{ recept.cas_pripravy }}</small></p>
          </div>

        </div>
      </div>
    } @empty {
      <div class="col-12 text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">Načítavam recepty z databázy...</p>
      </div>
    }
  </div>
</div>
